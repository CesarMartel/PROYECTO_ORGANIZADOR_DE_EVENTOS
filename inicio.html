<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página con Video de Fondo</title>

  <style>
    /*  Base y tipografía */
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Helvetica Neue', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Video de fondo */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -1;
    }

    /* Contenedor de contenido principal */
    .content-wrapper {
      position: relative;
      z-index: 1;
      padding: 8rem;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.45);
    }

    /* Caja de contenido */
    .content {
      background: rgba(20, 20, 20, 0.6);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
      max-width: 500px;
      max-height: 400px;
      width: 100%;
      text-align: center;
    }

    /* Título y párrafo */
    .content h1 {
      font-size: 3.2rem;
      margin-bottom: 1rem;
    }

    .content p {
      font-size: 1.3rem;
      max-width: 700px;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    /* 🔘 Botón de acción */
    .btn-submit {
      width: 100%;
      max-width: 250px;
      margin: 18px 0 9px;
      padding: 0.75rem;
      font-size: 1rem;
      border-radius: 5px;
      color: white;
      background: linear-gradient(135deg, #f64f59, #c471ed, #12c2e9);
      background-size: 200%;
      background-position: left;
      border: none;
      cursor: pointer;
      position: relative;
      z-index: 1;
      overflow: hidden;
      transition: background-position 0.6s ease-in-out, box-shadow 0.4s;
    }

    .btn-submit::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.6s ease-in-out;
      z-index: -1;
    }

    .btn-submit:hover {
      background-position: right;
      box-shadow: 0 0 20px 10px rgba(246, 79, 89, 0.4);
    }

    .btn-submit:hover::before {
      left: 100%;
    }

    /*  Pie de página */
    .footer {
      padding: 2rem;
      text-align: center;
      font-size: 0.9rem;
      color: #ddd;
      background: rgba(0, 0, 0, 0.6);
      position: relative;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>

<body>
  <!--  Video de fondo -->
  <video autoplay muted loop class="video-background">
    <source src="imagenes y videos/videof.mp4" type="video/mp4" />
    Tu navegador no soporta el video.
  </video>

  <!--  Sección principal -->
  <div class="content-wrapper">
    <div class="content">
      <h1>Bienvenido</h1>
      <p>Este portal te permite registrar y administrar eventos de manera rápida y eficiente. Dale vida a tus
        actividades, compártelas y hazlas memorables.</p>
      <button class="btn-submit" onclick="location.href='eventos.html'">Registrar Eventos</button>
    </div>
  </div>

  <!--  Marca registrada -->
  <footer class="footer">
    <p>© 2025 MB3-GROUP— Todos los derechos reservados</p>
  </footer>
</body>

</html>
